<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 模組化機械臂數位孿生</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #ui-layer { 
            position: absolute; top: 20px; left: 20px; color: #cdd6f4; pointer-events: none; z-index: 10; 
            background: rgba(49, 50, 68, 0.85); padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 220px;
            backdrop-filter: blur(4px);
            display: flex; flex-direction: column;
            max-height: 90vh; 
        }
        
        #ui-header { pointer-events: auto; cursor: pointer; user-select: none; text-align: center; padding-bottom: 5px; }
        #ui-header h2 { margin: 0; text-align: left; }
        #toggleIcon { 
            font-size: 12px; color: #a6adc8; margin-top: 8px; font-weight: bold; 
            transition: 0.3s; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 4px;
        }
        #toggleIcon:hover { background: rgba(255,255,255,0.2); color: #cdd6f4; }

        #ui-content { pointer-events: none; overflow-y: auto; padding-right: 5px; transition: max-height 0.3s ease, opacity 0.3s ease; }
        #ui-content::-webkit-scrollbar { width: 6px; }
        #ui-content::-webkit-scrollbar-thumb { background: #585b70; border-radius: 3px; }

        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-weight: bold; margin-bottom: 10px; }
        .status-READY { background: #a6e3a1; color: #111; }
        .status-WORKING { background: #89b4fa; color: #111; }
        .status-ERROR { background: #f38ba8; color: #111; }
        .status-OFFLINE { background: #6c7086; color: #111; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #btnArm, #baseRotationSelect { pointer-events: auto; }

        /* 📱 手機螢幕優化：UI 瘦身 */
        @media (max-width: 768px) {
            #ui-layer { left: 10px; top: 10px; right: 10px; padding: 10px; min-width: unset; max-height: 30vh; }
            #btnArm, #baseSettings, .hint, #selectionPanel, #angleListContainer { display: none !important; }
            #ui-header h2 { font-size: 16px; }
            #toggleIcon { font-size: 10px; padding: 2px; }

            /* 底部虛擬滑桿：選中才顯示 */
            #mobileControlOverlay {
                display: block !important; visibility: hidden; opacity: 0;
                position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
                width: 90%; background: rgba(49, 50, 68, 0.95); padding: 12px 20px; 
                border-radius: 15px; z-index: 100;
                transition: opacity 0.3s ease, visibility 0.3s;
                touch-action: none; 
                user-select: none; pointer-events: auto;
            }
            #mobileControlOverlay.active { visibility: visible; opacity: 1; }
            .slider-label { color: #f9e2af; font-weight: bold; margin-bottom: 5px; display: block; text-align: center; font-size: 14px; }
            #mobileSlider { width: 100%; height: 8px; -webkit-appearance: none; background: #585b70; border-radius: 5px; outline: none; }
            #mobileSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #89b4fa; border-radius: 50%; border: 3px solid #f5c2e7; }
        }

        #mobileControlOverlay { display: none; }

        /* 🔄 防橫向遮罩 */
        #orientation-mask {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e1e2e; z-index: 10000; justify-content: center; align-items: center;
            color: #cdd6f4; text-align: center;
        }
        .mask-content .rotate-icon { font-size: 50px; margin-bottom: 20px; animation: rotateAnim 2s infinite ease-in-out; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (orientation: landscape) and (max-width: 1024px) { #orientation-mask { display: flex; } }
    </style>
</head>
<body>
    <div id="orientation-mask">
        <div class="mask-content">
            <div class="rotate-icon">🔄</div>
            <p>請將手機轉回直向模式</p>
            <span>以獲得最佳操控體驗</span>
        </div>
    </div>

    <div id="ui-layer">
        <div id="ui-header" onclick="toggleUI()">
            <h2> 3D 數位監控</h2>
            <div id="toggleIcon">▼ 展開面板 ▼</div>
        </div>
        <div id="ui-content">
            <div style="margin-top: 15px;"></div>
            <div id="statusBadge" class="status-badge status-OFFLINE">等待連線...</div>
            <div>系統總節點數: <span id="totalCount">0</span></div>
            <div style="margin-top: 5px;">控制模式: <span id="modeDisplay" style="color:#a6e3a1; font-weight:bold;">🌐 網頁主控</span></div>
            <div style="color: #f38ba8; font-weight: bold; margin-top: 5px;" id="errorMsg"></div>
            <button id="btnArm" style="display: none; background: #a6e3a1; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%;">🔓 網頁解鎖通電</button>
            <div id="baseSettings" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;">
                <strong>⚙️ 實體底座設定：</strong>
                <select id="baseRotationSelect" style="background: #313244; color: #a6e3a1; border: 1px solid #585b70; border-radius: 4px; padding: 4px; font-weight: bold; width: 100%; margin-top: 5px;">
                    <option value="0">0° (預設)</option>
                    <option value="90">90° (逆時針)</option>
                    <option value="180">180°</option>
                    <option value="-90">270° (順時針)</option>
                </select>
            </div>
            <div id="selectionPanel" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;"><div id="selectedInfo">當前操控節點: ID 0</div></div>
            <div id="angleListContainer" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;"><strong> 關節即時角度：</strong><div id="angleListData" style="font-family: monospace;">等待數據...</div></div>
            <div id="endEffectorPanel" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;">
                <strong>🎯 絕對空間座標：</strong>
                <div id="xyzDisplay" style="color: #f9e2af; font-weight: bold;">X: 0.0 <br>Y: 0.0 <br>Z: 0.0</div>
            </div>
        </div>
    </div>

    <div id="mobileControlOverlay">
        <span class="slider-label" id="mLabel">請點擊 3D 關節進行控制</span>
        <input type="range" id="mobileSlider" min="0" max="1000" value="500">
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

    <script>
        const uiContent = document.getElementById('ui-content');
        const toggleIcon = document.getElementById('toggleIcon');
        let isUICollapsed = window.innerWidth <= 768; 

        function toggleUI() { isUICollapsed = !isUICollapsed; updateUIState(); }
        function updateUIState() {
            if (isUICollapsed) { uiContent.style.display = 'none'; toggleIcon.innerHTML = '▼ 點擊展開面板 ▼'; }
            else { uiContent.style.display = 'block'; toggleIcon.innerHTML = '▲ 點擊折疊面板 ▲'; }
        }
        updateUIState();

        const scene = new THREE.Scene();
        scene.add(new THREE.GridHelper(200, 50, 0x89b4fa, 0x313244));
        const axesHelper = new THREE.AxesHelper(100); scene.add(axesHelper);

        // 🌟 復活的魔法：永遠面向鏡頭的座標文字
        function createAxisLabel(text, colorStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = colorStr;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
            sprite.scale.set(20, 10, 1);
            return sprite;
        }

        let labelX = createAxisLabel('+X', '#f38ba8');
        let labelY = createAxisLabel('+Y', '#a6e3a1');
        let labelZ = createAxisLabel('+Z', '#89b4fa');
        scene.add(labelX); scene.add(labelY); scene.add(labelZ);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100000);
        camera.position.set(120, 100, 180);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.target.set(0, 50, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(100, 150, 50); scene.add(dirLight);

        const globalBaseGroup = new THREE.Group(); scene.add(globalBaseGroup);
        const modulesGroup = new THREE.Group(); globalBaseGroup.add(modulesGroup); 
        const endEffectorMarker = new THREE.Mesh(new THREE.SphereGeometry(2, 16, 16), new THREE.MeshBasicMaterial({ color: 0xf38ba8 }));

        let modules = {}; let latestTopology = []; let serverAngles = {}; let selectedNodeId = 0;
        let currentTopologyStr = ""; // 🌟 確保防抖動的安全鎖有乖乖待著
        let baseStlGeometry, pivotStlGeometry, bodyStlGeometry;
        const stlLoader = new THREE.STLLoader();

        function addBlackEdges(mesh) {
            const edges = new THREE.EdgesGeometry(mesh.geometry, 30);
            mesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x111111 })));
        }

        stlLoader.load('./base.stl', g => { 
            g.rotateY(Math.PI/2); g.scale(0.5, 0.5, 0.5); g.computeBoundingBox();
            const mesh = new THREE.Mesh(g, new THREE.MeshPhongMaterial({ color: 0xf5c2e7 }));
            mesh.position.y = -g.boundingBox.min.y; addBlackEdges(mesh); globalBaseGroup.add(mesh);
            modulesGroup.position.y = -g.boundingBox.min.y; rebuildTopology(latestTopology);
        });
        stlLoader.load('./pivot.stl', g => { g.rotateY(Math.PI); g.scale(0.5, 0.5, 0.5); pivotStlGeometry = g; rebuildTopology(latestTopology); });
        stlLoader.load('./body.stl', g => { g.rotateY(Math.PI); g.scale(0.5, 0.5, 0.5); bodyStlGeometry = g; rebuildTopology(latestTopology); });

        const ws = new WebSocket("wss://robot-arm-u40p.onrender.com");
        ws.onmessage = e => {
            const data = JSON.parse(e.data);
            if (data.status === "WORKING") {
                latestTopology = data.topology || [];
                latestTopology.forEach(n => serverAngles[n.id] = n.angle);
                
                // 🌟 特徵比對防抖動
                const newTopoStr = latestTopology.map(n => `${n.id}-${n.face}`).join('|');
                if (newTopoStr !== currentTopologyStr) {
                    rebuildTopology(latestTopology);
                    currentTopologyStr = newTopoStr;
                }
            }
            updateSystemUI(data);
        };

        function updateSystemUI(data) {
            document.getElementById('totalCount').innerText = data.total || 0;
            document.getElementById('statusBadge').innerText = data.status;
            document.getElementById('statusBadge').className = `status-badge status-${data.status}`;
        }

        function rebuildTopology(topo) {
            if (!pivotStlGeometry || !bodyStlGeometry) return;
            while(modulesGroup.children.length > 0) modulesGroup.remove(modulesGroup.children[0]);
            modules = {};
            topo.forEach(node => {
                const group = new THREE.Group(); const rotator = new THREE.Group(); group.add(rotator);
                const pMesh = new THREE.Mesh(pivotStlGeometry, new THREE.MeshPhongMaterial({ color: 0xa6adc8 }));
                const bMesh = new THREE.Mesh(bodyStlGeometry, new THREE.MeshPhongMaterial({ color: 0xf9e2af }));
                rotator.add(bMesh); group.add(pMesh); addBlackEdges(pMesh); addBlackEdges(bMesh);
                group.userData = { id: node.id, rotator: rotator }; pMesh.userData = { id: node.id, type: 'pivot' }; bMesh.userData = { id: node.id, type: 'body' };
                modules[node.id] = group;
            });
            topo.forEach(node => {
                if (node.id === 1) modulesGroup.add(modules[1]);
                const child = modules[node.id + 1];
                if (child) {
                    if (node.face === 0) child.position.set(0, 44.5, 0);
                    else { child.position.set(-20, 24.5, 0); child.rotation.z = Math.PI/2; }
                    modules[node.id].userData.rotator.add(child);
                }
            });
            
            // 🌟 懸浮標籤的高度動態推升
            let maxAxisLen = 100;
            if (topo.length > 0) maxAxisLen = Math.max(100, topo.length * 44.5 + 22.5);
            axesHelper.scale.set(1, maxAxisLen / 100, 1);
            labelX.position.set(110, 0, 0);
            labelY.position.set(0, maxAxisLen + 5, 0);
            labelZ.position.set(0, 0, 110);

            selectModule(selectedNodeId);
        }

        function selectModule(id) {
            const mOverlay = document.getElementById('mobileControlOverlay');
            if (selectedNodeId && selectedNodeId !== 0 && selectedNodeId !== id) {
                if (ws.readyState === 1) ws.send(JSON.stringify({ cmd: 'WEB_JOY', id: selectedNodeId, dir: 0 }));
            }
            for (let mid in modules) {
                modules[mid].traverse(c => {
                    if (c.isMesh && c.userData.type === 'pivot') c.material.color.setHex(mid == id ? 0x89b4fa : 0xa6adc8);
                    if (c.isMesh && c.userData.type === 'body') c.material.color.setHex(mid == id ? 0x89b4fa : 0xf9e2af);
                });
            }
            selectedNodeId = id;
            document.getElementById('selectedInfo').innerText = `當前操控節點: ID ${id || 0}`;
            if (window.innerWidth <= 768) {
                if (id > 0) {
                    mOverlay.classList.add('active');
                    document.getElementById('mobileSlider').value = serverAngles[id] || 500;
                    document.getElementById('mLabel').innerText = `控制 ID ${id} 轉軸`;
                } else mOverlay.classList.remove('active');
            }
        }

        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('pointerdown', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const isects = raycaster.intersectObjects(modulesGroup.children, true);
            if (isects.length > 0) {
                let o = isects[0].object; while (o && !o.userData.id) o = o.parent;
                if (o) selectModule(o.userData.id);
            } else selectModule(0);
        });

        // 🌟 補回：實體底座方向同步旋轉魔法！
        const baseRotationSelect = document.getElementById('baseRotationSelect');
        if (baseRotationSelect) {
            baseRotationSelect.addEventListener('change', (e) => {
                // 將選取的角度轉換為弧度，並直接讓整個積木群組跟著轉！
                modulesGroup.rotation.y = parseInt(e.target.value) * (Math.PI / 180);
            });
        }ㄒ

        const mSlider = document.getElementById('mobileSlider');
        mSlider.addEventListener('touchstart', e => e.stopPropagation(), {passive: false});
        mSlider.addEventListener('touchmove', e => e.stopPropagation(), {passive: false});
        mSlider.addEventListener('input', e => {
            if (selectedNodeId > 0 && ws.readyState === 1) {
                ws.send(JSON.stringify({ cmd: 'SET_POS', id: selectedNodeId, pos: parseInt(e.target.value) }));
            }
        });

        window.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); ws.send(JSON.stringify({cmd: 'RESET_ALL'})); return; }
            
            // 🌟 上下鍵選取積木功能復活！
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                let maxId = latestTopology.length;
                let currentId = selectedNodeId || 0;
                if (e.key === 'ArrowUp' && currentId < maxId) selectModule(currentId + 1);
                else if (e.key === 'ArrowDown' && currentId > 0) selectModule(currentId - 1);
                return;
            }

            if (selectedNodeId > 0) {
                let dir = 0;
                if (e.key === 'ArrowRight') dir = 1; if (e.key === 'ArrowLeft') dir = -1;
                if (dir !== 0) ws.send(JSON.stringify({cmd: 'WEB_JOY', id: selectedNodeId, dir: dir}));
            }
        });
        window.addEventListener('keyup', e => {
            if (selectedNodeId > 0 && ['ArrowRight', 'ArrowLeft'].includes(e.key)) {
                ws.send(JSON.stringify({cmd: 'WEB_JOY', id: selectedNodeId, dir: 0}));
            }
        });

        let worldVec = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate); controls.update();
            for (let id in serverAngles) if (modules[id]) {
                const target = (serverAngles[id] - 500) * (240 / 1000) * (Math.PI / 180);
                modules[id].userData.rotator.rotation.y += (target - modules[id].userData.rotator.rotation.y) * 0.15;
            }
            if (latestTopology.length > 0) {
                modules[latestTopology[latestTopology.length-1].id].userData.rotator.getWorldPosition(worldVec);
                document.getElementById('xyzDisplay').innerHTML = `X: ${(worldVec.x*2).toFixed(1)} <br>Y: ${(worldVec.y*2).toFixed(1)} <br>Z: ${(worldVec.z*2).toFixed(1)}`;
            }
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
