<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模組化機械臂數位孿生</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #cdd6f4; pointer-events: none; z-index: 10; background: rgba(49, 50, 68, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-width: 200px;}
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-weight: bold; margin-bottom: 10px; }
        .status-READY { background: #a6e3a1; color: #111; }
        .status-WORKING { background: #89b4fa; color: #111; }
        .status-ERROR { background: #f38ba8; color: #111; }
        .status-OFFLINE { background: #6c7086; color: #111; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .hint { font-size: 12px; color: #a6adc8; margin-top: 15px; line-height: 1.5; }
        .kbd-key { background: #45475a; padding: 2px 6px; border-radius: 4px; color: #cdd6f4; font-family: monospace; }
        #btnArm, #baseRotationSelect { pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 style="margin-top: 0;"> 3D 數位監控</h2>
        <div id="statusBadge" class="status-badge status-OFFLINE">等待連線...</div>
        <div>系統總節點數: <span id="totalCount">0</span></div>
        <div style="margin-top: 5px;">控制模式: <span id="modeDisplay" style="color:#a6e3a1; font-weight:bold;">🌐 網頁主控</span></div>
        <div style="color: #f38ba8; font-weight: bold; margin-top: 5px;" id="errorMsg"></div>
        
        <button id="btnArm" style="display: none; background: #a6e3a1; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: 0.3s;">🔓 網頁解鎖通電</button>
        
        <div id="baseSettings" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;">
            <strong>⚙️ 實體底座設定：</strong>
            <div style="margin-top: 8px; font-size: 14px; display: flex; align-items: center; justify-content: space-between;">
                <label>接頭方向</label>
                <select id="baseRotationSelect" style="background: #313244; color: #a6e3a1; border: 1px solid #585b70; border-radius: 4px; padding: 4px; font-weight: bold; cursor: pointer;">
                    <option value="0">0° (預設: X朝前)</option>
                    <option value="90">90° (逆時針轉)</option>
                    <option value="180">180° (轉向後方)</option>
                    <option value="-90">270° (順時針轉)</option>
                </select>
            </div>
        </div>

        <div id="selectionPanel" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px; font-weight: bold; font-size: 15px;">
            <div id="selectedInfo" style="color: #a6adc8;">當前操控節點: 無</div>
        </div>

        <div id="angleListContainer" style="margin-top: 15px; font-size: 14px; color: #a6adc8; border-top: 1px solid #45475a; padding-top: 10px;">
            <strong> 關節即時角度：</strong>
            <div id="angleListData" style="margin-top: 5px; font-family: monospace;">等待數據...</div>
        </div>

        <div class="hint">
            <strong>主控端操作指南：</strong><br>
            1. 滑鼠左鍵點擊模型選取關節<br>
            2. 使用 <span class="kbd-key">W</span> <span class="kbd-key">D</span> / <span class="kbd-key">↑</span> <span class="kbd-key">→</span> 正轉<br>
            3. 使用 <span class="kbd-key">A</span> <span class="kbd-key">S</span> / <span class="kbd-key">↓</span> <span class="kbd-key">←</span> 反轉<br>
            4. 按 <span class="kbd-key">N</span> 切換網頁/實體遙控模式
        </div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const gridHelper = new THREE.GridHelper(200, 50, 0x89b4fa, 0x313244);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(120, 100, 180); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.target.set(0, 50, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 150, 50);
        scene.add(dirLight);

        const globalBaseGroup = new THREE.Group(); 
        scene.add(globalBaseGroup);

        const modulesGroup = new THREE.Group(); 
        globalBaseGroup.add(modulesGroup); 

        const CUBE_SIZE = 30; 
        const PIVOT_HEIGHT = 5; 

        let modules = {}; 
        let currentTopologyStr = ""; 
        let latestTopology = []; 
        let baseHeightOffset = 0; 

        let baseStlGeometry = null;
        let pivotStlGeometry = null;
        let bodyStlGeometry = null;
        const stlLoader = new THREE.STLLoader();

        function addBlackEdges(mesh) {
            const edges = new THREE.EdgesGeometry(mesh.geometry, 30);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x111111, linewidth: 1 });
            const lineSegments = new THREE.LineSegments(edges, lineMat);
            mesh.add(lineSegments);
        }

        function checkAndRebuild() {
            if (latestTopology.length > 0) rebuildTopology(latestTopology);
        }

        stlLoader.load('./base.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI / 2); 
            geometry.scale(0.5, 0.5, 0.5); 
            geometry.computeBoundingBox();
            baseHeightOffset = -geometry.boundingBox.min.y; 

            const baseMat = new THREE.MeshPhongMaterial({ color: 0xf5c2e7 });
            const baseMesh = new THREE.Mesh(geometry, baseMat);
            baseMesh.position.y = baseHeightOffset; 
            
            addBlackEdges(baseMesh); 
            globalBaseGroup.add(baseMesh);
            modulesGroup.position.y = baseHeightOffset; 
            checkAndRebuild();
        });

        stlLoader.load('./pivot.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI); 
            geometry.scale(0.5, 0.5, 0.5); 
            pivotStlGeometry = geometry;
            checkAndRebuild(); 
        });

        stlLoader.load('./body.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI); 
            geometry.scale(0.5, 0.5, 0.5); 
            bodyStlGeometry = geometry;
            checkAndRebuild(); 
        });

        const ws = new WebSocket("wss://robot-arm-u40p.onrender.com");

        let serverAngles = {}; 
        let lastWsMsgTime = 0; 

        setInterval(() => {
            if (ws.readyState === WebSocket.OPEN) {
                if (Date.now() - lastWsMsgTime > 2000) {
                    updateSystemUI("S3_OFFLINE");
                }
            }
        }, 1000);

        function updateSystemUI(state, data = null) {
            const badge = document.getElementById('statusBadge');
            const btnArmEl = document.getElementById('btnArm');
            const errorMsgEl = document.getElementById('errorMsg');

            if (state === "SERVER_ONLY") {
                badge.className = 'status-badge status-OFFLINE';
                badge.style.background = '#89b4fa';
                badge.innerText = '🌐 伺服器連線中 (尋找主板...)';
                if (btnArmEl) btnArmEl.style.display = 'none';
            } 
            else if (state === "S3_OFFLINE") {
                badge.className = 'status-badge status-ERROR';
                badge.style.background = '#f38ba8';
                badge.innerText = '⚠️ 伺服器已連線，但 S3 主板未上線';
                if (btnArmEl) btnArmEl.style.display = 'none';
                
                if (currentTopologyStr !== "") {
                    latestTopology = [];
                    rebuildTopology([]); 
                    currentTopologyStr = "";
                    selectModule(null);
                    const angleListDataEl = document.getElementById('angleListData');
                    if (angleListDataEl) angleListDataEl.innerHTML = "等待數據...";
                }
            } 
            else if (state === "OFFLINE") {
                badge.className = 'status-badge status-OFFLINE';
                badge.style.background = '';
                badge.innerText = '❌ 伺服器斷線';
                if (btnArmEl) btnArmEl.style.display = 'none';
            } 
            else if (state === "ONLINE" && data) {
                badge.className = `status-badge status-${data.status}`;
                badge.style.background = ''; 
                badge.innerText = data.status;
                if (errorMsgEl) errorMsgEl.innerText = data.msg || "";

                if (data.status === "READY") {
                    if (btnArmEl) {
                        btnArmEl.style.display = 'block';
                        btnArmEl.innerText = "🔓 網頁解鎖通電";
                        btnArmEl.style.background = '#a6e3a1';
                        btnArmEl.disabled = false;
                        btnArmEl.style.cursor = 'pointer';
                    }
                } else if (data.status === "WORKING") {
                    if (btnArmEl) {
                        btnArmEl.style.display = 'block';
                        btnArmEl.innerText = "✅ 系統已解鎖 / 允許操控";
                        btnArmEl.style.background = '#89b4fa';
                        btnArmEl.disabled = true;
                        btnArmEl.style.cursor = 'not-allowed';
                    }
                } else if (data.status === "HOMING") {
                    if (btnArmEl) {
                        btnArmEl.style.display = 'block';
                        btnArmEl.innerText = "🧘 歸零中...";
                        btnArmEl.style.background = '#f9e2af';
                        btnArmEl.disabled = true;
                    }
                } else {
                    if (btnArmEl) btnArmEl.style.display = 'none';
                }
            }
        }

        ws.onopen = () => {
            updateSystemUI("SERVER_ONLY");
            ws.send(JSON.stringify({cmd: 'STATUS'}));
        };

        ws.onmessage = (event) => {
            lastWsMsgTime = Date.now(); 
            const data = JSON.parse(event.data);
            
            if (data.total !== undefined) {
                const totalCountEl = document.getElementById('totalCount');
                if (totalCountEl) totalCountEl.innerText = data.total;
            }
            
            // 🌟 解析並顯示當前控制模式
            if (data.mode !== undefined) {
                const modeDisplay = document.getElementById('modeDisplay');
                if (data.mode === "WEB") {
                    modeDisplay.innerText = "🌐 網頁主控";
                    modeDisplay.style.color = "#a6e3a1";
                } else if (data.mode === "REMOTE") {
                    modeDisplay.innerText = "🎮 實體遙控器";
                    modeDisplay.style.color = "#fab387";
                }
            }

            updateSystemUI("ONLINE", data);

            if (data.status === "READY" || data.status === "WORKING" || data.status === "HOMING") {
                latestTopology = data.topology || [];
                const newTopoStr = latestTopology.map(n => `${n.id}-${n.face}`).join('|');
                
                if (newTopoStr !== currentTopologyStr) {
                    rebuildTopology(latestTopology);
                    currentTopologyStr = newTopoStr;
                    if (selectedNodeId && !latestTopology.find(n => n.id === selectedNodeId)) {
                        selectModule(null);
                    }
                }

                let angleHtmlStr = "";
                latestTopology.forEach((node) => {
                    if (modules[node.id] && node.angle !== undefined) {
                        serverAngles[node.id] = node.angle; 

                        const realAngle = ((node.angle - 500) * (240 / 1000)).toFixed(1);
                        const sign = realAngle >= 0 ? "+" : ""; 
                        angleHtmlStr += `ID ${node.id} 轉軸: <span style="color:#a6e3a1;">${sign}${realAngle}°</span><br>`;
                    }
                });
                
                const angleListDataEl = document.getElementById('angleListData');
                if (angleListDataEl) angleListDataEl.innerHTML = angleHtmlStr;
            }
        };

        ws.onclose = () => {
            updateSystemUI("OFFLINE");
        };

        const btnArm = document.getElementById('btnArm');
        if (btnArm) {
            btnArm.addEventListener('click', () => {
                ws.send(JSON.stringify({ cmd: "ARM" }));
            });
        }

        const baseRotationSelect = document.getElementById('baseRotationSelect');
        if (baseRotationSelect) {
            baseRotationSelect.addEventListener('change', (e) => {
                globalBaseGroup.rotation.y = parseInt(e.target.value) * (Math.PI / 180);
            });
        }

        function createModule(id, colorHex) {
            const baseGroup = new THREE.Group(); 
            const rotatorGroup = new THREE.Group(); 
            baseGroup.add(rotatorGroup);

            let pivotMesh;
            const pivotMat = new THREE.MeshPhongMaterial({ color: 0xa6adc8, shininess: 100 });
            if (pivotStlGeometry) {
                pivotMesh = new THREE.Mesh(pivotStlGeometry, pivotMat);
            } else {
                const pivotGeo = new THREE.CylinderGeometry(13, 13, PIVOT_HEIGHT, 32);
                pivotMesh = new THREE.Mesh(pivotGeo, pivotMat);
                pivotMesh.position.y = PIVOT_HEIGHT / 2; 
            }
            addBlackEdges(pivotMesh); 
            baseGroup.add(pivotMesh); 

            let bodyMesh;
            const bodyMat = new THREE.MeshPhongMaterial({ color: colorHex });
            if (bodyStlGeometry) {
                bodyMesh = new THREE.Mesh(bodyStlGeometry, bodyMat);
            } else {
                const bodyGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
                bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                bodyMesh.position.y = PIVOT_HEIGHT + (CUBE_SIZE / 2); 
            }
            addBlackEdges(bodyMesh); 
            rotatorGroup.add(bodyMesh); 

            baseGroup.userData = { id: id, rotator: rotatorGroup };
            pivotMesh.userData = { id: id };
            bodyMesh.userData = { id: id };

            return baseGroup;
        }

        function rebuildTopology(topologyArray) {
            while(modulesGroup.children.length > 0) {
                modulesGroup.remove(modulesGroup.children[0]);
            }
            modules = {}; 

            if (!topologyArray || topologyArray.length === 0) return;

            topologyArray.forEach((node) => {
                modules[node.id] = createModule(node.id, 0xf9e2af);
            });

            if (modules[1]) {
                modules[1].position.set(0, 0, 0); 
                modulesGroup.add(modules[1]);
            }

            for (let i = 0; i < topologyArray.length; i++) {
                const parentNode = topologyArray[i];
                const parentId = parentNode.id;
                const childId = parentId + 1; 
                const parentFace = parentNode.face; 

                if (modules[childId] && modules[parentId]) {
                    if (parentFace === 0) { 
                        modules[childId].position.set(0, 44.5, 0);
                        modules[childId].rotation.set(0, 0, 0); 
                    } 
                    else if (parentFace === 1) { 
                        modules[childId].position.set(-20.0, 24.5, 0);
                        modules[childId].rotation.set(0, 0, Math.PI / 2); 
                    }
                    modules[parentId].userData.rotator.add(modules[childId]);
                }
            }
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedNodeId = null;

        renderer.domElement.addEventListener('pointerdown', (event) => {
            if(event.pointerType === 'touch') return; 

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(modulesGroup.children, true);
            
            if (intersects.length > 0) {
                let object = intersects[0].object;
                while (object && (!object.userData || !object.userData.id)) {
                    object = object.parent;
                }
                if (object && object.userData && object.userData.id) {
                    selectModule(object.userData.id);
                } else {
                    selectModule(null);
                }
            } else {
                selectModule(null);
            }
        });

        function selectModule(id) {
            modulesGroup.traverse((child) => {
                if (child.isMesh && child.material && child.material.emissive) {
                    child.material.emissive.setHex(0x000000);
                }
            });
            
            selectedNodeId = id;
            const infoEl = document.getElementById('selectedInfo');
            
            if (id && modules[id]) {
                modules[id].traverse((child) => {
                    if (child.isMesh && child.userData && child.userData.id === id && child.material.emissive) {
                        child.material.emissive.setHex(0x333333); 
                    }
                });
                infoEl.innerText = `當前操控節點: ID ${id}`;
                infoEl.style.color = "#a6e3a1";
            } else {
                infoEl.innerText = "當前操控節點: 無";
                infoEl.style.color = "#a6adc8";
            }
        }

        window.addEventListener('keydown', (event) => {
            // 🌟 模式切換按鍵捕捉
            if (event.key === 'n' || event.key === 'N') {
                ws.send(JSON.stringify({cmd: 'TOGGLE_MODE'}));
                return;
            }

            if (!selectedNodeId || event.repeat) return; 
            
            let dir = 0;
            if (['w', 'W', 'd', 'D', 'ArrowRight', 'ArrowUp'].includes(event.key)) dir = 1;
            if (['a', 'A', 's', 'S', 'ArrowLeft', 'ArrowDown'].includes(event.key)) dir = -1;

            if (dir !== 0) {
                ws.send(JSON.stringify({cmd: 'WEB_JOY', id: selectedNodeId, dir: dir}));
            }
        });

        window.addEventListener('keyup', (event) => {
            if (!selectedNodeId) return; 
            if (['w', 'W', 'd', 'D', 'ArrowRight', 'ArrowUp', 'a', 'A', 's', 'S', 'ArrowLeft', 'ArrowDown'].includes(event.key)) {
                ws.send(JSON.stringify({cmd: 'WEB_JOY', id: selectedNodeId, dir: 0})); 
            }
        });
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            for (let id in serverAngles) {
                if (modules[id]) {
                    const targetRad = (serverAngles[id] - 500) * (240 / 1000) * (Math.PI / 180);
                    modules[id].userData.rotator.rotation.y += (targetRad - modules[id].userData.rotator.rotation.y) * 0.15;
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
