<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模組化機械臂數位孿生</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #cdd6f4; pointer-events: none; z-index: 10; background: rgba(49, 50, 68, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-weight: bold; margin-bottom: 10px; }
        .status-READY { background: #a6e3a1; color: #111; }
        .status-WORKING { background: #89b4fa; color: #111; }
        .status-ERROR { background: #f38ba8; color: #111; }
        .status-OFFLINE { background: #6c7086; color: #111; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .hint { font-size: 12px; color: #a6adc8; margin-top: 15px; }
        
        /* 讓下拉選單跟按鈕可以被滑鼠點擊 */
        #btnArm, #baseRotationSelect { pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 style="margin-top: 0;"> 3D 數位監控</h2>
        <div id="statusBadge" class="status-badge status-OFFLINE">等待連線...</div>
        <div>系統總節點數: <span id="totalCount">0</span></div>
        <div style="color: #f38ba8; font-weight: bold; margin-top: 5px;" id="errorMsg"></div>
        
        <button id="btnArm" style="display: none; background: #a6e3a1; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%;">🔓 網頁解鎖通電</button>
        
        <div id="baseSettings" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px;">
            <strong>⚙️ 實體底座設定：</strong>
            <div style="margin-top: 8px; font-size: 14px; display: flex; align-items: center; justify-content: space-between;">
                <label>方形接頭方向</label>
                <select id="baseRotationSelect" style="background: #313244; color: #a6e3a1; border: 1px solid #585b70; border-radius: 4px; padding: 4px; font-weight: bold; cursor: pointer;">
                    <option value="0">0° (預設: X朝前)</option>
                    <option value="90">90° (逆時針轉)</option>
                    <option value="180">180° (轉向後方)</option>
                    <option value="-90">270° (順時針轉)</option>
                </select>
            </div>
        </div>

        <div id="controlsContainer" style="margin-top: 15px; border-top: 1px solid #45475a; padding-top: 10px; display: none;"></div>

        <div id="angleListContainer" style="margin-top: 15px; font-size: 14px; color: #a6adc8; border-top: 1px solid #45475a; padding-top: 10px;">
            <strong> 關節即時角度：</strong>
            <div id="angleListData" style="margin-top: 5px; font-family: monospace;">等待數據...</div>
        </div>

        <div class="hint">滑鼠左鍵：旋轉視角<br>滑鼠右鍵：平移<br>滾輪：縮放</div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const gridHelper = new THREE.GridHelper(200, 50, 0x89b4fa, 0x313244);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(120, 100, 180); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.target.set(0, 50, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 150, 50);
        scene.add(dirLight);

        let robotBaseGroup = new THREE.Group();
        scene.add(robotBaseGroup);

        const CUBE_SIZE = 30; 
        const PIVOT_HEIGHT = 5; 
        const TOTAL_HEIGHT = CUBE_SIZE + PIVOT_HEIGHT; 
        
        let modules = {}; 
        let currentTopologyStr = ""; 
        const ws = new WebSocket("wss://robot-arm-u40p.onrender.com");

        // 🌟 STL 模型存放變數
        let baseStlGeometry = null;
        let pivotStlGeometry = null;
        let bodyStlGeometry = null;
        let baseOffsetAngle = 0; // 記錄底座的旋轉角度
        const stlLoader = new THREE.STLLoader();

        // 🌟 1. 載入底座 (base.stl)
        stlLoader.load('./base.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI / 2); // 將 SW 的 (X朝前,Z朝右) 轉換為網頁座標系 (-Z朝前,+X朝右)
            // geometry.scale(0.5, 0.5, 0.5); // 如果載入太大，可以解開這行調整縮放比例
            baseStlGeometry = geometry;
        }, undefined, () => console.log("⚠️ 未找到 base.stl，將使用預設圓柱"));

        // 🌟 2. 載入轉軸 (pivot.stl)
        stlLoader.load('./pivot.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI); // 將左手座標轉為右手座標 (轉 180 度)
            // geometry.scale(0.5, 0.5, 0.5);
            pivotStlGeometry = geometry;
        }, undefined, () => console.log("⚠️ 未找到 pivot.stl，將使用預設圓柱"));

        // 🌟 3. 載入外殼本體 (body.stl)
        stlLoader.load('./body.stl', function (geometry) {
            geometry.computeVertexNormals();
            geometry.rotateY(Math.PI); // 將左手座標轉為右手座標 (轉 180 度)
            // geometry.scale(0.5, 0.5, 0.5);
            bodyStlGeometry = geometry;
        }, undefined, () => console.log("⚠️ 未找到 body.stl，將使用預設方塊"));


        // 綁定解鎖按鈕的點擊事件
        const btnArm = document.getElementById('btnArm');
        if (btnArm) {
            btnArm.addEventListener('click', () => {
                ws.send(JSON.stringify({ cmd: "ARM" }));
                btnArm.style.display = 'none'; 
            });
        }

        // 🌟 綁定底座四向旋轉下拉選單
        const baseRotationSelect = document.getElementById('baseRotationSelect');
        if (baseRotationSelect) {
            baseRotationSelect.addEventListener('change', (e) => {
                baseOffsetAngle = parseInt(e.target.value) * (Math.PI / 180);
                if (modules[1]) {
                    // 立刻改變第一顆模組的初始角度，上面所有的子模組都會跟著公轉！
                    modules[1].rotation.y = baseOffsetAngle; 
                }
            });
        }

        function createModule(id, colorHex) {
            const baseGroup = new THREE.Group(); 
            const rotatorGroup = new THREE.Group(); 
            baseGroup.add(rotatorGroup);

            // 🔧 建立轉軸 (Pivot)：固定在 baseGroup，不跟著自轉！
            let pivotMesh;
            const pivotMat = new THREE.MeshPhongMaterial({ color: 0xa6adc8, shininess: 100 });
            if (pivotStlGeometry) {
                pivotMesh = new THREE.Mesh(pivotStlGeometry, pivotMat);
            } else {
                const pivotGeo = new THREE.CylinderGeometry(13, 13, PIVOT_HEIGHT, 32);
                pivotMesh = new THREE.Mesh(pivotGeo, pivotMat);
                pivotMesh.position.y = PIVOT_HEIGHT / 2; 
            }
            baseGroup.add(pivotMesh); // 👉 加到 baseGroup

            // 📦 建立外殼本體 (Body)：裝在馬達旋轉軸上，跟著轉！
            let bodyMesh;
            const bodyMat = new THREE.MeshPhongMaterial({ color: colorHex });
            if (bodyStlGeometry) {
                bodyMesh = new THREE.Mesh(bodyStlGeometry, bodyMat);
            } else {
                const bodyGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
                bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
                bodyMesh.position.y = PIVOT_HEIGHT + (CUBE_SIZE / 2); 
            }
            rotatorGroup.add(bodyMesh); // 👉 加到 rotatorGroup

            baseGroup.userData = { id: id, rotator: rotatorGroup };
            return baseGroup;
        }

        function rebuildTopology(topologyArray) {
            scene.remove(robotBaseGroup);
            robotBaseGroup = new THREE.Group();
            scene.add(robotBaseGroup);
            modules = {}; 

            if (!topologyArray || topologyArray.length === 0) return;

            // 🌟 繪製固定底座：優先使用載入的 STL
            const baseMat = new THREE.MeshPhongMaterial({ color: 0xf5c2e7 });
            let baseModule;
            if (baseStlGeometry) {
                baseModule = new THREE.Mesh(baseStlGeometry, baseMat);
                baseModule.position.set(0, 0, 0);
            } else {
                const baseGeo = new THREE.CylinderGeometry(35, 35, 10, 32);
                baseModule = new THREE.Mesh(baseGeo, baseMat);
                baseModule.position.y = -5; 
            }
            robotBaseGroup.add(baseModule);
            
            // 動態生成控制滑桿介面
            let controlsHtml = "<strong>🎚️ 網頁端控制：</strong><br><br>";

            topologyArray.forEach((node) => {
                modules[node.id] = createModule(node.id, 0xf9e2af);
                
                // 根據拓樸建立對應的 HTML 滑桿
                controlsHtml += `
                <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
                    <label style="font-size: 14px;">ID ${node.id}</label>
                    <input type="range" min="0" max="1000" value="500" id="slider-${node.id}" style="width: 120px; margin: 0 10px;"
                    oninput="ws.send(JSON.stringify({cmd:'SET_ANGLE', id:${node.id}, angle:parseInt(this.value)}))">
                </div>`;
            });

            const controlsContainer = document.getElementById('controlsContainer');
            if (controlsContainer) {
                controlsContainer.innerHTML = controlsHtml;
            }

            if (modules[1]) {
                modules[1].position.set(0, 0, 0); 
                // 🌟 套用目前的底座接頭安裝方向
                modules[1].rotation.y = baseOffsetAngle; 
                robotBaseGroup.add(modules[1]);
            }

            for (let i = 0; i < topologyArray.length; i++) {
                const parentNode = topologyArray[i];
                const parentId = parentNode.id;
                const childId = parentId + 1; 
                const parentFace = parentNode.face; 

                if (modules[childId] && modules[parentId]) {
                    // 🌟 根據你的 C3 程式碼：FACE1 是頂部，FACE0 是側邊
                    if (parentFace === 1) { 
                        modules[childId].position.set(0, TOTAL_HEIGHT, 0);
                        modules[childId].rotation.set(0, 0, 0); // 頂部繼承方向
                    } 
                    else if (parentFace === 0) { 
                        // 側邊在老大的左側 (網頁空間的 -X 方向)
                        modules[childId].position.set(-CUBE_SIZE / 2, PIVOT_HEIGHT + (CUBE_SIZE / 2), 0);
                        // 向左倒 90 度
                        modules[childId].rotation.set(0, 0, Math.PI / 2); 
                    }
                    
                    modules[parentId].userData.rotator.add(modules[childId]);
                }
            }
        }

        ws.onopen = () => console.log('連線至伺服器成功');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge status-${data.status}`;
            badge.innerText = data.status;
            
            const errorMsgEl = document.getElementById('errorMsg');
            if (errorMsgEl) errorMsgEl.innerText = data.msg || "";
            
            const totalCountEl = document.getElementById('totalCount');
            if (totalCountEl) totalCountEl.innerText = data.total || 0;

            // 處理 UI 介面（解鎖按鈕與滑桿）的顯示與隱藏
            const btnArmEl = document.getElementById('btnArm');
            const controlsContainerEl = document.getElementById('controlsContainer');
            
            if (btnArmEl && controlsContainerEl) {
                if (data.status === "READY") {
                    btnArmEl.style.display = 'block';
                    controlsContainerEl.style.display = 'none';
                } else if (data.status === "WORKING") {
                    btnArmEl.style.display = 'none';
                    controlsContainerEl.style.display = 'block';
                } else {
                    btnArmEl.style.display = 'none';
                    controlsContainerEl.style.display = 'none';
                }
            }

            if (data.status === "READY" || data.status === "WORKING" || data.status === "HOMING") {
                const newTopoStr = data.topology.map(n => `${n.id}-${n.face}`).join('|');
                
                if (newTopoStr !== currentTopologyStr) {
                    rebuildTopology(data.topology);
                    currentTopologyStr = newTopoStr;
                }

                let angleHtmlStr = "";
                
                data.topology.forEach((node) => {
                    if (modules[node.id] && node.angle !== undefined) {
                        // 更新 3D 模型旋轉
                        const angleRad = (node.angle - 500) * (240 / 1000) * (Math.PI / 180);
                        modules[node.id].userData.rotator.rotation.y = angleRad;
                        
                        // 雙向同步：檢查實體滑桿是否正被拖曳，若無則更新其數值
                        const slider = document.getElementById(`slider-${node.id}`);
                        if (slider && document.activeElement !== slider) {
                            slider.value = node.angle;
                        }

                        // 產生角度資訊文字
                        const realAngle = ((node.angle - 500) * (240 / 1000)).toFixed(1);
                        const sign = realAngle >= 0 ? "+" : ""; 
                        angleHtmlStr += `ID ${node.id} 轉軸: <span style="color:#a6e3a1;">${sign}${realAngle}°</span><br>`;
                    }
                });
                
                const angleListDataEl = document.getElementById('angleListData');
                if (angleListDataEl) angleListDataEl.innerHTML = angleHtmlStr;

            } else {
                if (currentTopologyStr !== "") {
                    rebuildTopology([]); 
                    currentTopologyStr = "";
                    const angleListDataEl = document.getElementById('angleListData');
                    if (angleListDataEl) angleListDataEl.innerHTML = "等待數據...";
                }
            }
        };

        ws.onclose = () => {
            const badge = document.getElementById('statusBadge');
            if (badge) {
                badge.className = 'status-badge status-OFFLINE';
                badge.innerText = '與伺服器斷線';
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
