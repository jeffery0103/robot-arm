<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模組化機械臂數位孿生</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #cdd6f4; pointer-events: none; z-index: 10; background: rgba(49, 50, 68, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-weight: bold; margin-bottom: 10px; }
        .status-READY { background: #a6e3a1; color: #111; }
        .status-WORKING { background: #89b4fa; color: #111; }
        .status-ERROR { background: #f38ba8; color: #111; }
        .status-OFFLINE { background: #6c7086; color: #111; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .hint { font-size: 12px; color: #a6adc8; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h2 style="margin-top: 0;">🦾 3D 數位孿生監控</h2>
        <div id="statusBadge" class="status-badge status-OFFLINE">等待連線...</div>
        <div>系統總節點數: <span id="totalCount">0</span></div>
        <div style="color: #f38ba8; font-weight: bold; margin-top: 5px;" id="errorMsg"></div>
        <div class="hint">滑鼠左鍵：旋轉視角<br>滑鼠右鍵：平移<br>滾輪：縮放</div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. 基礎場景
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const gridHelper = new THREE.GridHelper(200, 50, 0x89b4fa, 0x313244);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(120, 100, 180); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.target.set(0, 50, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 150, 50);
        scene.add(dirLight);

        let robotBaseGroup = new THREE.Group();
        scene.add(robotBaseGroup);

        const CUBE_SIZE = 30; 
        const PIVOT_HEIGHT = 10;
        const TOTAL_HEIGHT = CUBE_SIZE + PIVOT_HEIGHT; 
        
        let modules = {}; // 將積木字典拉到全域，方便我們隨時更新角度！
        let currentTopologyStr = ""; // 紀錄目前的拓樸狀態，避免重複重建模型

        function createModule(id, colorHex) {
            const group = new THREE.Group(); 

            // 🌟 轉軸更新為「銀灰色金屬亮面」！(0xa6adc8，加上 shininess 反光)
            const pivotGeo = new THREE.CylinderGeometry(8, 8, PIVOT_HEIGHT, 32);
            const pivotMat = new THREE.MeshPhongMaterial({ color: 0xa6adc8, shininess: 100 });
            const pivot = new THREE.Mesh(pivotGeo, pivotMat);
            pivot.position.y = PIVOT_HEIGHT / 2; 
            group.add(pivot);

            const bodyGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
            const bodyMat = new THREE.MeshPhongMaterial({ color: colorHex });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = PIVOT_HEIGHT + (CUBE_SIZE / 2); 
            group.add(body);

            const indicatorGeo = new THREE.SphereGeometry(3, 16, 16);
            const indicatorMat = new THREE.MeshBasicMaterial({ color: 0xf38ba8 });
            const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
            indicator.position.set(0, PIVOT_HEIGHT + (CUBE_SIZE / 2), CUBE_SIZE / 2 + 1); 
            group.add(indicator);

            group.userData = { id: id };
            return group;
        }

        // 3. 拓樸樹狀圖解析與組裝 (只在積木插拔時觸發)
        function rebuildTopology(topologyArray) {
            scene.remove(robotBaseGroup);
            robotBaseGroup = new THREE.Group();
            scene.add(robotBaseGroup);
            modules = {}; // 清空字典

            if (!topologyArray || topologyArray.length === 0) return;

            const baseGeo = new THREE.CylinderGeometry(30, 30, 10, 32);
            const baseMat = new THREE.MeshPhongMaterial({ color: 0xf5c2e7 });
            const baseModule = new THREE.Mesh(baseGeo, baseMat);
            baseModule.position.y = -5; 
            robotBaseGroup.add(baseModule);
            
            topologyArray.forEach((node) => {
                modules[node.id] = createModule(node.id, 0xf9e2af);
            });

            if (modules[1]) {
                modules[1].position.set(0, 0, 0); 
                robotBaseGroup.add(modules[1]);
            }

            for (let i = 0; i < topologyArray.length; i++) {
                const parentNode = topologyArray[i];
                const parentId = parentNode.id;
                const childId = parentId + 1; 
                const parentFace = parentNode.face; 

                if (modules[childId] && modules[parentId]) {
                    if (parentFace === 0) {
                        modules[childId].position.set(0, TOTAL_HEIGHT, 0);
                    } 
                    else if (parentFace === 1) {
                        modules[childId].position.set(CUBE_SIZE / 2, PIVOT_HEIGHT + (CUBE_SIZE / 2), 0);
                        modules[childId].rotation.set(0, 0, 0); 
                        modules[childId].rotateZ(-Math.PI / 2); 
                        modules[childId].rotateY(Math.PI); 
                    }
                    modules[parentId].add(modules[childId]);
                }
            }
        }

        // 4. WebSocket 雲端連線
        const ws = new WebSocket("wss://robot-arm-u40p.onrender.com");

        ws.onopen = () => console.log('✅ 成功連線到 Render 伺服器！');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge status-${data.status}`;
            badge.innerText = data.status;
            document.getElementById('errorMsg').innerText = data.msg || "";
            document.getElementById('totalCount').innerText = data.total || 0;

            if (data.status === "READY" || data.status === "WORKING") {
                // 將目前的拓樸狀態轉成字串，用來判斷有沒有增減積木
                const newTopoStr = data.topology.map(n => `${n.id}-${n.face}`).join('|');
                
                // 只有在插拔積木 (骨架改變) 時，才重新建造 3D 模型！
                if (newTopoStr !== currentTopologyStr) {
                    rebuildTopology(data.topology);
                    currentTopologyStr = newTopoStr;
                }

                // 🌟 即時動態連動魔法：更新每個關節的旋轉角度！
                data.topology.forEach((node) => {
                    if (modules[node.id] && node.angle !== undefined) {
                        // 數學映射：將 LX-224 的 0~1000 轉換成弧度 (-120度 ~ +120度)
                        // 假設 500 是正前方 (0度)
                        const angleRad = (node.angle - 500) * (240 / 1000) * (Math.PI / 180);
                        
                        // 讓該模組沿著自己的 Y 軸轉動 (就是那根銀色轉軸的方向！)
                        modules[node.id].rotation.y = angleRad;
                    }
                });

            } else {
                if (currentTopologyStr !== "") {
                    rebuildTopology([]); 
                    currentTopologyStr = "";
                }
            }
        };

        ws.onclose = () => {
            document.getElementById('statusBadge').className = 'status-badge status-OFFLINE';
            document.getElementById('statusBadge').innerText = '與伺服器斷線';
        };

        // 5. 渲染迴圈
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
