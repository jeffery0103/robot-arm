<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模組化機械臂數位孿生</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #cdd6f4; pointer-events: none; z-index: 10; background: rgba(49, 50, 68, 0.8); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-weight: bold; margin-bottom: 10px; }
        .status-READY { background: #a6e3a1; color: #111; }
        .status-WORKING { background: #89b4fa; color: #111; }
        .status-ERROR { background: #f38ba8; color: #111; }
        .status-OFFLINE { background: #6c7086; color: #111; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .hint { font-size: 12px; color: #a6adc8; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2 style="margin-top: 0;">🦾 3D 數位孿生監控</h2>
        <div id="statusBadge" class="status-badge status-OFFLINE">等待連線...</div>
        <div>系統總節點數: <span id="totalCount">0</span></div>
        <div style="color: #f38ba8; font-weight: bold; margin-top: 5px;" id="errorMsg"></div>
        <div class="hint">滑鼠左鍵：旋轉視角<br>滑鼠右鍵：平移<br>滾輪：縮放</div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ----------------------------------------------------
        // 1. 基礎 3D 場景建構
        // ----------------------------------------------------
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const gridHelper = new THREE.GridHelper(200, 50, 0x89b4fa, 0x313244);
        scene.add(gridHelper);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(100, 80, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.target.set(0, 30, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        let robotBaseGroup = new THREE.Group();
        scene.add(robotBaseGroup);

        // ----------------------------------------------------
        // 2. 模組化積木生成邏輯 
        // ----------------------------------------------------
        const CUBE_SIZE = 30; 
        const PIVOT_HEIGHT = 5;

        function createModule(id, colorHex) {
            const group = new THREE.Group(); 

            const pivotGeo = new THREE.CylinderGeometry(10, 10, PIVOT_HEIGHT, 32);
            const pivotMat = new THREE.MeshPhongMaterial({ color: 0x313244 });
            const pivot = new THREE.Mesh(pivotGeo, pivotMat);
            pivot.position.y = PIVOT_HEIGHT / 2; 
            group.add(pivot);

            const bodyGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);
            const bodyMat = new THREE.MeshPhongMaterial({ color: colorHex });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = -(CUBE_SIZE / 2);
            group.add(body);

            const indicatorGeo = new THREE.SphereGeometry(3, 16, 16);
            const indicatorMat = new THREE.MeshBasicMaterial({ color: 0xf38ba8 });
            const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
            indicator.position.set(0, -(CUBE_SIZE / 2), CUBE_SIZE / 2 + 2); 
            group.add(indicator);

            group.userData = { id: id };
            return group;
        }

        // ----------------------------------------------------
        // 3. 拓樸樹狀圖解析與組裝引擎
        // ----------------------------------------------------
        function rebuildTopology(topologyArray) {
            scene.remove(robotBaseGroup);
            robotBaseGroup = new THREE.Group();
            scene.add(robotBaseGroup);

            if (!topologyArray || topologyArray.length === 0) return;

            const modules = {}; 
            
            const baseModule = createModule(0, 0xf5c2e7);
            baseModule.position.y = 50; 
            robotBaseGroup.add(baseModule);
            modules[0] = baseModule;

            topologyArray.forEach((node) => {
                const childId = node.id;
                const parentFace = node.face; 
                
                const parentId = childId - 1; 
                const parentModule = modules[parentId];

                if (parentModule) {
                    const childModule = createModule(childId, 0xf9e2af); 
                    modules[childId] = childModule;
                    
                    if (parentFace === 0) {
                        childModule.position.y = -(PIVOT_HEIGHT + CUBE_SIZE + 2);
                    } 
                    else if (parentFace === 1) {
                        childModule.position.x = (CUBE_SIZE / 2) + PIVOT_HEIGHT + 2;
                        childModule.position.y = -(CUBE_SIZE / 2);
                        childModule.rotation.z = -Math.PI / 2; 
                    }

                    parentModule.add(childModule);
                }
            });
        }

        // ----------------------------------------------------
        // 4. WebSocket 雲端連線邏輯
        // ----------------------------------------------------
        const ws = new WebSocket("wss://robot-arm-u40p.onrender.com");

        ws.onopen = () => console.log('✅ 成功連線到 Render 伺服器！');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge status-${data.status}`;
            badge.innerText = data.status;
            document.getElementById('errorMsg').innerText = data.msg || "";
            document.getElementById('totalCount').innerText = data.total || 0;

            if (data.status === "READY" || data.status === "WORKING") {
                rebuildTopology(data.topology);
            } else {
                rebuildTopology([]); 
            }
        };

        ws.onclose = () => {
            document.getElementById('statusBadge').className = 'status-badge status-OFFLINE';
            document.getElementById('statusBadge').innerText = '與伺服器斷線';
        };

        // ----------------------------------------------------
        // 5. 渲染迴圈
        // ----------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
